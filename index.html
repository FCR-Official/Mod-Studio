<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Studio - Universal Compiler Ecosystem</title>
    <link rel="icon" type="image/png" href="costume1 (24).png">
    
    <style>
        :root {
            --bg-black: #000000;
            --panel-dark: #050505;
            --panel-card: #0a0a0a;
            --logo-dark-green: #035338;
            --logo-dark-green-glow: rgba(3, 83, 56, 0.4);
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            
            /* Launcher Brand Accent Colors */
            --brand-turbowarp: #ff4c4c;
            --brand-penguinmod: #00c3ff;
            --brand-scratchviews: #4d97ff;
            --brand-remix: #ff9800;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Top Navigation Header bar */
        .mod-studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background-color: var(--panel-dark);
            border-bottom: 2px solid var(--logo-dark-green);
            box-shadow: 0 4px 25px var(--logo-dark-green-glow);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .header-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--logo-dark-green);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .header-title span {
            color: var(--logo-dark-green);
        }

        /* Centered Profile Dropdown Selector */
        .engine-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(3, 83, 56, 0.1);
            border: 1px solid var(--logo-dark-green);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
        }

        .engine-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--logo-dark-green);
        }

        .dropdown-select {
            background: var(--bg-black);
            color: var(--text-main);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        /* Layout Workspaces */
        .workspace-container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .panel-info {
            margin-bottom: 1.5rem;
        }

        .panel-info h2 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .panel-info p {
            color: var(--text-muted);
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
        }

        /* Platform Launcher Action Hub Grid */
        .launcher-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .launcher-btn {
            background: var(--panel-card);
            border: 1px solid #1f1f1f;
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
            text-align: left;
            transition: all 0.2s ease;
        }

        .launcher-btn span {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* Hover Glow Parameters per Brand */
        .btn-ms:hover { border-color: var(--logo-dark-green); box-shadow: 0 0 15px var(--logo-dark-green-glow); }
        .btn-ms:hover span { color: var(--logo-dark-green); }

        .btn-tw:hover { border-color: var(--brand-turbowarp); box-shadow: 0 0 15px rgba(255, 76, 76, 0.2); }
        .btn-tw:hover span { color: var(--brand-turbowarp); }

        .btn-pm:hover { border-color: var(--brand-penguinmod); box-shadow: 0 0 15px rgba(0, 195, 255, 0.2); }
        .btn-pm:hover span { color: var(--brand-penguinmod); }

        .btn-sv:hover { border-color: var(--brand-scratchviews); box-shadow: 0 0 15px rgba(77, 151, 255, 0.2); }
        .btn-sv:hover span { color: var(--brand-scratchviews); }

        .btn-rx:hover { border-color: var(--brand-remix); box-shadow: 0 0 15px rgba(255, 152, 0, 0.2); }
        .btn-rx:hover span { color: var(--brand-remix); }

        /* Code Block Container Box */
        .code-box-wrapper {
            background-color: var(--panel-card);
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .code-header {
            background-color: var(--panel-dark);
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .btn-action {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--logo-dark-green);
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background-color: var(--logo-dark-green);
            box-shadow: 0 0 10px var(--logo-dark-green);
        }

        pre {
            margin: 0;
            padding: 1.5rem;
            overflow-x: auto;
            background: #000000;
        }

        code {
            font-family: 'Consolas', 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #10b981;
        }
    </style>
</head>
<body>

    <header class="mod-studio-header">
        <a href="#" class="header-brand">
            <img src="costume1 (24).png" alt="Mod Studio Logo" class="header-logo">
            <div class="header-title">Mod<span>Studio</span></div>
        </a>

        <div class="engine-selector-wrapper">
            <span class="engine-label">Compiler Target:</span>
            <select class="dropdown-select" id="engineTarget" onchange="compileTheme()">
                <option value="scratch-addons">Scratch Addons Profile (.json)</option>
                <option value="turbowarp">TurboWarp Custom Preferences (.json)</option>
                <option value="penguinmod">PenguinMod Wireframe Engine (.json)</option>
            </select>
        </div>

        <nav class="header-nav">
            <button class="btn-action" onclick="downloadConfig()">Download Output</button>
        </nav>
    </header>

    <main class="workspace-container">
        <div class="panel-info">
            <h2 id="displayTitle">Initializing Target Core...</h2>
            <p id="displayDesc">Parsing internal configuration definitions directly to memory block sheets.</p>
        </div>

        <div class="launcher-dashboard">
            <button class="launcher-btn btn-ms" onclick="launchModStudio()">
                💻 Open Mod Studio View
                <span>Launch local injection layout</span>
            </button>
            <button class="launcher-btn btn-tw" onclick="launchTurboWarp()">
                🚀 Open in TurboWarp
                <span>Test code in TurboWarp's runner</span>
            </button>
            <button class="launcher-btn btn-pm" onclick="launchPenguinMod()">
                🐧 Open in PenguinMod
                <span>Test extensions in PenguinMod</span>
            </button>
            <button class="launcher-btn btn-sv" onclick="launchScratchViews()">
                👁️ Render Scratch Views
                <span>Preview syntax via scratchviews.com</span>
            </button>
            <button class="launcher-btn btn-rx" onclick="remixProjectTemplate()">
                🎨 Remix Base Template
                <span>Fork preset project workspace</span>
            </button>
        </div>

        <div class="code-box-wrapper">
            <div class="code-header">
                <span class="file-name" id="fileNameDisplay">manifest.json</span>
                <button class="btn-action" onclick="copyToClipboard()">Copy Payload</button>
            </div>
            <pre><code id="jsonContainer">Executing environment initialization parameters...</code></pre>
        </div>
    </main>

    <script>
        // Config entries map your exact structural features (Clones in Events, Stop Hats, Time Category)
        const coreSourceManifest = {
            "scratch-addons": {
                fileName: "scratch-addons-settings.json",
                title: "Scratch Addons Profile + Block Layout Extensions",
                desc: "Outputs custom parameters layout settings mapping pure black blocks and restructuring native event behaviors.",
                code: `{\n  "editor-theme3": {\n    "enabled": true,\n    "settings": {\n      "Pen-color": "10b981ff",\n      "_version": 4,\n      "input-color": "000000ff",\n      "operators-color": "10b981ff",\n      "text": "colorOnBlack"\n    }\n  },\n  "modstudio-block-overrides": {\n    "enabled": true,\n    "settings": {\n      "relocateClonesToEvents": true,\n      "enableStopSignHatBlock": true,\n      "injectTimeBlocksCategory": true,\n      "timeBlocksColor": "#035338"\n    }\n  }\n}`
            },
            "turbowarp": {
                fileName: "turbowarp-preferences.json",
                title: "TurboWarp Desktop / Web Preference Array",
                desc: "Compiles custom preference extensions handling category swaps alongside standard absolute dark theme canvas scripts.",
                code: `{\n  "tw-editor-colors": {\n    "enabled": true,\n    "version": 2,\n    "theme": "custom",\n    "variables": {\n      "blockFills": "000000",\n      "blockInputs": "000000",\n      "operatorAccent": "10b981"\n    }\n  },\n  "tw-category-tweaks": {\n    "moveClonesToEvents": true,\n    "customHatStopSign": true,\n    "registerTimeCategory": {\n      "name": "Time Blocks",\n      "color": "#035338",\n      "blocks": ["current_hour", "current_minute", "current_second", "unix_timestamp"]\n    }\n  }\n}`
            },
            "penguinmod": {
                fileName: "penguinmod-wireframe.json",
                title: "PenguinMod Layout Profile Engine Mapping",
                desc: "Assembles custom visual wireframe parameters tracking local structural block categorization hooks.",
                code: `{\n  "penguinCustomThemes": {\n    "activeProfile": "ModStudioBlackout",\n    "blockStyle": "neon-wireframe",\n    "colors": {\n      "background": "000000",\n      "lines": "10b981"\n    }\n  },\n  "penguinCustomBlocks": {\n    "forceEventsCloneCategory": true,\n    "enableStopHat": true,\n    "customTimeEngine": true\n  }\n}`
            }
        };

        function compileTheme() {
            const currentSelection = document.getElementById("engineTarget").value;
            const targetProfile = coreSourceManifest[currentSelection];
            document.getElementById("displayTitle").innerText = targetProfile.title;
            document.getElementById("displayDesc").innerText = targetProfile.desc;
            document.getElementById("fileNameDisplay").innerText = targetProfile.fileName;
            document.getElementById("jsonContainer").innerText = targetProfile.code;
        }

        function getPayload() {
            return encodeURIComponent(document.getElementById("jsonContainer").innerText);
        }

        /* Active Platform Handshake Actions */
        function launchModStudio() {
            alert("Mod Studio Core Active. Time-blocks, Stop Hat mutations, and Clone-category overrides locked in.");
        }

        function launchTurboWarp() {
            window.open(`https://turbowarp.org/editor?addons=custom-themes&theme-data=${getPayload()}`, '_blank');
        }

        function launchPenguinMod() {
            window.open(`https://studio.penguinmod.com/editor.html?custom-theme=${getPayload()}`, '_blank');
        }

        function launchScratchViews() {
            window.open(`https://scratchviews.com/#theme=dark&blocks=${getPayload()}`, '_blank');
        }

        function remixProjectTemplate() {
            // Direct launch route linking custom preset boilerplate environments
            window.open(`https://turbowarp.org/editor?addons=custom-themes&theme-data=${getPayload()}`, '_blank');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById("jsonContainer").innerText).then(() => {
                alert("🎯 Payload cloned securely to clipboard buffer memory!");
            });
        }

        function downloadConfig() {
            const currentSelection = document.getElementById("engineTarget").value;
            const targetProfile = coreSourceManifest[currentSelection];
            const dataStream = "data:text/plain;charset=utf-8," + encodeURIComponent(targetProfile.code);
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStream);
            anchor.setAttribute("download", targetProfile.fileName);
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
        }

        window.onload = compileTheme;
    </script>
</body>
</html>
