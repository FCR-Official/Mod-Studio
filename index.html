<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Studio - Universal Compiler Ecosystem</title>
    <link rel="icon" type="image/png" href="costume1 (24).png">
    
    <style>
        :root {
            --bg-black: #000000;
            --panel-dark: #050505;
            --panel-card: #0a0a0a;
            --logo-dark-green: #035338;
            --logo-dark-green-glow: rgba(3, 83, 56, 0.4);
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --brand-turbowarp: #ff4c4c;
            --brand-penguinmod: #00c3ff;
            --brand-scratchviews: #4d97ff;
            --brand-remix: #ff9800;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
        }

        .mod-studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 2rem;
            background-color: var(--panel-dark);
            border-bottom: 2px solid var(--logo-dark-green);
            box-shadow: 0 4px 25px var(--logo-dark-green-glow);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .header-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--logo-dark-green);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-title span { color: var(--logo-dark-green); }

        .engine-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(3, 83, 56, 0.1);
            border: 1px solid var(--logo-dark-green);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
        }

        .dropdown-select {
            background: var(--bg-black);
            color: var(--text-main);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .workspace-container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .panel-info { margin-bottom: 1.5rem; }
        .panel-info h2 { margin: 0; font-size: 1.75rem; }
        .panel-info p { color: var(--text-muted); margin-top: 0.5rem; }

        .launcher-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .launcher-btn {
            background: var(--panel-card);
            border: 1px solid #1f1f1f;
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.25rem;
            transition: 0.2s ease;
        }

        .launcher-btn span { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

        .btn-ms:hover { border-color: var(--logo-dark-green); box-shadow: 0 0 15px var(--logo-dark-green-glow); }
        .btn-tw:hover { border-color: var(--brand-turbowarp); box-shadow: 0 0 15px rgba(255, 76, 76, 0.2); }
        .btn-pm:hover { border-color: var(--brand-penguinmod); box-shadow: 0 0 15px rgba(0, 195, 255, 0.2); }
        .btn-sv:hover { border-color: var(--brand-scratchviews); box-shadow: 0 0 15px rgba(77, 151, 255, 0.2); }

        .code-box-wrapper {
            background-color: var(--panel-card);
            border: 1px solid #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            background-color: var(--panel-dark);
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        pre { margin: 0; padding: 1.5rem; background: #000000; overflow-x: auto; }
        code { font-family: 'Consolas', monospace; color: #10b981; font-size: 0.9rem; }
        .btn-action { background: transparent; color: #fff; border: 1px solid var(--logo-dark-green); padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .btn-action:hover { background: var(--logo-dark-green); }
    </style>
</head>
<body>

    <header class="mod-studio-header">
        <a href="#" class="header-brand">
            <img src="costume1 (24).png" alt="Logo" class="header-logo">
            <div class="header-title">Mod<span>Studio</span></div>
        </a>

        <div class="engine-selector-wrapper">
            <select class="dropdown-select" id="engineTarget" onchange="compileTheme()">
                <option value="scratch-addons">Scratch Addons Profile (.json)</option>
                <option value="turbowarp">TurboWarp Custom Preferences (.json)</option>
                <option value="penguinmod">PenguinMod Wireframe Engine (.json)</option>
            </select>
        </div>

        <button class="btn-action" onclick="downloadConfig()">Download Output</button>
    </header>

    <main class="workspace-container">
        <div class="panel-info">
            <h2 id="displayTitle">Loading Configurations...</h2>
            <p id="displayDesc">Parsing structural changes.</p>
        </div>

        <div class="launcher-dashboard">
            <button class="launcher-btn btn-ms" onclick="syncActiveSettings()">
                ⚡ Sync Active Changes
                <span>Inject current configurations into addon memory</span>
            </button>
            <button class="launcher-btn btn-tw" onclick="window.open('https://turbowarp.org/editor', '_blank')">
                🚀 Open TurboWarp
                <span>Launch workspace runner directly</span>
            </button>
            <button class="launcher-btn btn-pm" onclick="window.open('https://studio.penguinmod.com/editor.html', '_blank')">
                🐧 Open PenguinMod
                <span>Test code block extensions</span>
            </button>
            <button class="launcher-btn btn-sv" onclick="window.open('https://scratchviews.com', '_blank')">
                👁️ Open Scratch Views
                <span>Preview syntax layouts</span>
            </button>
        </div>

        <div class="code-box-wrapper">
            <div class="code-header">
                <span id="fileNameDisplay">manifest.json</span>
                <button class="btn-action" onclick="copyToClipboard()">Copy Code</button>
            </div>
            <pre><code id="jsonContainer">Loading layout profiles...</code></pre>
        </div>
    </main>

    <script>
        const coreSourceManifest = {
            "scratch-addons": {
                fileName: "scratch-addons-settings.json",
                title: "Scratch Addons Profile Layout System",
                desc: "Outputs custom configurations grouping Pure Black block canvases, customized stop hats, and relocation hooks.",
                code: `{\n  "editor-theme3": {\n    "enabled": true,\n    "settings": {\n      "input-color": "000000ff",\n      "operators-color": "10b981ff",\n      "text": "colorOnBlack"\n    }\n  },\n  "modstudio-block-overrides": {\n    "enableStopSignHatBlock": true,\n    "relocateClonesToEvents": true,\n    "injectTimeBlocksCategory": true\n  }\n}`
            },
            "turbowarp": {
                fileName: "turbowarp-preferences.json",
                title: "TurboWarp Native System Core Override",
                desc: "Compiles absolute midnight canvas overrides mapping variables to active blocks.",
                code: `{\n  "tw-editor-colors": {\n    "enabled": true,\n    "variables": {\n      "blockFills": "000000",\n      "blockInputs": "000000",\n      "operatorAccent": "10b981"\n    }\n  },\n  "tw-category-tweaks": {\n    "moveClonesToEvents": true,\n    "customHatStopSign": true,\n    "registerTimeCategory": true\n  }\n}`
            },
            "penguinmod": {
                fileName: "penguinmod-wireframe.json",
                title: "PenguinMod Layout Extension Map",
                desc: "Compiles wireframe parameters and structural positioning definitions for community custom extensions.",
                code: `{\n  "penguinCustomThemes": {\n    "blockStyle": "neon-wireframe",\n    "colors": { "background": "000000", "lines": "10b981" }\n  },\n  "penguinCustomBlocks": {\n    "forceEventsCloneCategory": true,\n    "enableStopHat": true,\n    "customTimeEngine": true\n  }\n}`
            }
        };

        function compileTheme() {
            const currentSelection = document.getElementById("engineTarget").value;
            const targetProfile = coreSourceManifest[currentSelection];
            document.getElementById("displayTitle").innerText = targetProfile.title;
            document.getElementById("displayDesc").innerText = targetProfile.desc;
            document.getElementById("fileNameDisplay").innerText = targetProfile.fileName;
            document.getElementById("jsonContainer").innerText = targetProfile.code;
        }

        // Broadcaster Engine: Fires layout data payloads straight through browser windows
        function syncActiveSettings() {
            const activeCodePayload = document.getElementById("jsonContainer").innerText;
            window.postMessage({ type: "MOD_STUDIO_SYNC", payload: activeCodePayload }, "*");
            alert("🎯 Connected! Layout overrides successfully sent into script memory. Open TurboWarp or PenguinMod to see your live blocks!");
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById("jsonContainer").innerText).then(() => {
                alert("🎯 Copied payload data!");
            });
        }

        function downloadConfig() {
            const currentSelection = document.getElementById("engineTarget").value;
            const targetProfile = coreSourceManifest[currentSelection];
            const dataStream = "data:text/plain;charset=utf-8," + encodeURIComponent(targetProfile.code);
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStream);
            anchor.setAttribute("download", targetProfile.fileName);
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
        }

        window.onload = compileTheme;
    </script>
</body>
</html>
